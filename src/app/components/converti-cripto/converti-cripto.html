<div class="transaction-card">
  <div class="transaction-header">
    <h2>Converti in criptovaluta</h2>
    <p>
      Visualizza l’equivalente del <strong>saldo attuale</strong> in BTC o ETH (quotazione da API esterna).
    </p>
  </div>

  <label>
    Criptovaluta di destinazione
    <select [value]="currency()" (change)="currency.set($any($event.target).value)">
      <option value="BTC">Bitcoin (BTC)</option>
      <option value="ETH">Ethereum (ETH)</option>
    </select>
  </label>

  <button type="button" (click)="convert()" [disabled]="pending()">
    {{ pending() ? 'Calcolo…' : 'Converti' }}
  </button>

  <p class="result" *ngIf="result()">Risultato: {{ result() }}</p>
  <p class="error" *ngIf="error()">{{ error() }}</p>
</div>
