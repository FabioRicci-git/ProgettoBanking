<div class="transaction-card">
  <div class="transaction-header">
    <h2>Deposita fondi</h2>
    <p>Aggiungi rapidamente denaro al tuo conto e aumenta il saldo disponibile.</p>
  </div>

  <label>
    Importo di deposito
    <input type="number" min="0" step="0.01" [value]="amount()" (input)="onAmountChange($event)" placeholder="€ 0,00" />
  </label>

  <button type="button" (click)="submitDeposit()">Deposita</button>

  <p class="success" *ngIf="success()">{{ success() }}</p>
  <p class="error" *ngIf="error()">{{ error() }}</p>
</div>
