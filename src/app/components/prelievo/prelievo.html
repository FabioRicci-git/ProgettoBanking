<div class="transaction-card">
  <div class="transaction-header">
    <h2>Preleva fondi</h2>
    <p>Scegli l’importo da ritirare e verifica il saldo residuo dopo l’operazione.</p>
    <p class="current-balance">
      Saldo attuale: <strong>{{ bank.balance() | number:'1.2-2' }} {{ bank.currency() }}</strong>
    </p>
  </div>

  <label>
    Importo da prelevare
    <input type="number" min="0" step="0.01" [value]="amount()" (input)="onAmountChange($event)" placeholder="€ 0,00" />
  </label>

  <button type="button" (click)="submitWithdrawal()" [disabled]="pending()">
    {{ pending() ? 'Invio…' : 'Preleva' }}
  </button>

  <p class="success" *ngIf="success()">{{ success() }}</p>
  <p class="error" *ngIf="error()">{{ error() }}</p>
</div>
