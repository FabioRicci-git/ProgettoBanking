<div class="transaction-card">
  <div class="transaction-header">
    <h2>Converti valute</h2>
    <p>
      Visualizza l’equivalente del <strong>saldo attuale</strong> del conto in un’altra valuta (dati forniti dall’API esterna).
    </p>
  </div>

  <label>
    Valuta di destinazione
    <select [value]="currency()" (change)="currency.set($any($event.target).value)">
      <option value="USD">Dollaro USA (USD)</option>
      <option value="GBP">Sterlina (GBP)</option>
    </select>
  </label>

  <button type="button" (click)="convert()" [disabled]="pending()">
    {{ pending() ? 'Calcolo…' : 'Converti' }}
  </button>

  <p class="result" *ngIf="result()">Risultato: {{ result() }}</p>
  <p class="error" *ngIf="error()">{{ error() }}</p>
</div>
